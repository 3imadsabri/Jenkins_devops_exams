apiVersion: apps/v1
kind: Deployment
metadata:
  name: cast-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cast-db
  template:
    metadata:
      labels:
        app: cast-db
    spec:
      containers:
      - name: cast-db
        image: postgres:12.1-alpine
        env:
        - name: POSTGRES_USER
          value: "{{ .Values.castDb.user }}"
        - name: POSTGRES_PASSWORD
          value: "{{ .Values.castDb.password }}"
        - name: POSTGRES_DB
          value: "{{ .Values.castDb.database }}"
        ports:
        - containerPort: 5432
