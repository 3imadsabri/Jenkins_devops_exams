apiVersion: apps/v1
kind: Deployment

metadata:
  name: movie-service

spec:
  replicas: 3

  selector:
    matchLabels:
      app: movie-service

  template:
    metadata:
      labels:
        app: movie-service

    spec:

      imagePullSecrets:
      - name: regcred

      containers:

      - name: movie-service

        image: "{{ .Values.movie.image.repository }}:{{ .Values.movie.image.tag }}"

        ports:
        - containerPort: 8000

        env:

        - name: DATABASE_URI
          value: "postgresql://{{ .Values.movieDb.user }}:{{ .Values.movieDb.password }}@movie-db/{{ .Values.movieDb.database }}"

        - name: CAST_SERVICE_HOST_URL
          value: "http://cast-service:8000/api/v1/casts/"

        readinessProbe:
          httpGet:
            path: /api/v1/movies/
            port: 8000

        livenessProbe:
          httpGet:
            path: /api/v1/movies/
            port: 8000
