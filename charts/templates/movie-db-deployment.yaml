apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-db

spec:
  replicas: 1

  selector:
    matchLabels:
      app: movie-db

  template:
    metadata:
      labels:
        app: movie-db

    spec:
      containers:
      - name: movie-db

        image: postgres:12.1-alpine

        env:
        - name: POSTGRES_USER
          value: "{{ .Values.movieDb.user }}"

        - name: POSTGRES_PASSWORD
          value: "{{ .Values.movieDb.password }}"

        - name: POSTGRES_DB
          value: "{{ .Values.movieDb.database }}"

        ports:
        - containerPort: 5432
